# Email Triage Configuration
# Copy to config.yaml and customize

# Email provider settings
provider:
  # "gmail_cli" uses a CLI tool (like gws) to access Gmail API
  # "gmail_api" is planned but not yet implemented
  type: gmail_cli
  cli_path: gws  # path to your Gmail CLI tool
  # Use "me" for the authenticated account, or a full email address
  # for delegation / service accounts.
  account: me

# Classification rules
# Rules are evaluated in priority order (lower = checked first).
# First matching rule wins. Domain matching is exact (no substring).
classification:
  # Auth/security signals - highest priority
  auth:
    priority: 10
    domains:
      - github.com
      - anthropic.com
      - google.com
      - accounts.google.com
      - cloudflare.com
      - stripe.com
      - vercel.com
      - supabase.com
      - hetzner.com
    terms:
      - two-factor
      - 2fa
      - recovery
      - otp
      - one-time password
      - verify your identity
      - security alert
      - sign-in
      - new device
      - account access
      - personal access token
      - token expir
      - password expir
    # Requires BOTH a domain match AND a term match
    require_both: true
    # Gmail actions to take on auth emails (optional)
    actions: [star, leave_unread]

  # Suspicious - phishing/scam indicators
  suspicious:
    priority: 20
    terms:
      - urgent
      - verify your account
      - confirm your
      - act now
      - limited time
      - click here to confirm
      - suspended
      - unusual activity
      - wire transfer
      - tax refund
      - lottery
      - prize
      - you have won
    # Triggers when 2+ terms match (configurable)
    min_matches: 2
    actions: [leave_unread]

  # Actionable - trusted vendor, not auth
  actionable:
    priority: 30
    # Reuses the same domain list as auth
    inherit_domains_from: auth
    actions: [mark_read]

  # Social digests
  social:
    priority: 40
    sender_patterns:
      - slack
      - discord
      - twitter
      - linkedin
      - facebook
      - notifications@github.com
    actions: [mark_read]

  # Newsletters
  newsletter:
    priority: 50
    sender_patterns:
      - substack
      - beehiiv
      - newsletter@
      - digest@
      - no-reply@
      - noreply@
      - marketing@
      - mailchimp
      - sendgrid
    # Also triggers on List-Unsubscribe header
    check_unsubscribe_header: true
    actions: [mark_read]

  # Everything else
  noise:
    priority: 100
    # Catch-all for unrecognized senders
    actions: [mark_read]

# Interpretation layers
# Controls how much processing happens before output.
# Layers run in order. Each layer enriches the classification result.
interpretation:
  layers:
    # Layer 1: Basic classification (always runs)
    - name: classify
      enabled: true

    # Layer 2: Content extraction
    # Pulls key info from the email body (dates, names, amounts, action items)
    - name: extract
      enabled: true
      settings:
        max_snippet_length: 1500
        strip_urls: true         # replace URLs with [URL stripped]
        strip_signatures: true   # remove email signatures
        fetch_full_body: false   # set true to fetch full MIME body instead of snippet

    # Layer 3: Summarization
    # Generates a 1-2 sentence summary of the email's purpose
    - name: summarize
      enabled: false  # requires LLM - set llm_command below
      settings:
        llm_command: ""  # e.g., "llm -m gpt-4o-mini" or "claude -p"
        max_tokens: 150

# Output backends
# Where classified emails get reported
outputs:
  # Print to console (always available)
  console:
    enabled: true
    format: table  # "table" or "json"

  # Write markdown files
  markdown:
    enabled: false
    output_dir: ./inbox/triage
    # One file per run, or one file per email
    mode: per_run  # "per_run" or "per_email"

  # Newsletter notes (markdown with frontmatter)
  # Only processes emails classified as "newsletter"
  newsletter:
    enabled: false
    output_dir: ./inbox/newsletters
    frontmatter_template: |
      ---
      type: email-newsletter
      sender: "{sender}"
      subject: "{subject}"
      date: "{date}"
      gmail_id: "{message_id}"
      captured: "{today}"
      ---

  # Post to webhook (Slack, Discord, etc.)
  # SSRF-protected: private/internal IPs are blocked
  webhook:
    enabled: false
    url: ""
    payload_template: |
      {
        "text": "[{category}] {sender}: {subject}"
      }

  # Append results as JSONL (one JSON object per line)
  json_log:
    enabled: true
    path: ./logs/email_triage.jsonl

  # Pipe results as JSON to any shell command
  # Each email is one JSON line on stdin. Use this for:
  #   - Vector DBs (ChromaDB, Qdrant, Pinecone)
  #   - Databases (SQLite, Postgres)
  #   - APIs (Notion, Airtable, Linear)
  command:
    enabled: false
    cmd: ""  # e.g., "python3 vectorize.py" or "jq -c . >> emails.jsonl"
    categories: []  # empty = all categories. Or: [newsletter, actionable]

  # Call a Python function per email (full plugin system)
  # Your script must define a function that accepts (result_dict, config)
  custom_script:
    enabled: false
    script: ""        # e.g., "./my_output.py"
    function: "handle_email"
    categories: []    # empty = all categories

# Security settings
security:
  scrub_content: true       # redact API keys, file paths, credentials
  strip_urls: true           # replace URLs with [URL stripped]
  default_category: suspicious  # when classification is ambiguous
  max_body_size: 102400      # truncate before regex (prevents ReDoS)

# State tracking
state:
  enabled: true
  path: ./state/processed.json

# Schedule (informational only — not read by this tool. Use cron or your scheduler.)
schedule:
  lookback: "newer_than:1d"
  max_per_run: 50
